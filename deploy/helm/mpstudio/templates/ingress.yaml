{{- if .Values.ingress.enabled }}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ .Values.ingress.managedCertificateName }}
  namespace: {{ .Values.namespace }}
spec:
  domains:
    - {{ .Values.ingress.webHost }}
    - {{ .Values.ingress.apiHost }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mpstudio
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: {{ .Values.ingress.managedCertificateName | quote }}
spec:
  rules:
    - host: {{ .Values.ingress.webHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
{{- end }}

