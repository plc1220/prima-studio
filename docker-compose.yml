x-gcp-env: &gcp-env
  GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
  GCP_REGION: ${GCP_REGION:-asia-southeast1}
  GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID:-}
  CLOUDSDK_CONFIG: /root/.config/gcloud
  GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash}
  VEO_MODEL_NAME: ${VEO_MODEL_NAME:-veo-3.1-generate-001}
  VEO_FAST_MODEL_NAME: ${VEO_FAST_MODEL_NAME:-veo-3.1-fast-generate-001}

x-gcp-adc-volume: &gcp-adc-volume ${HOME}/.config/gcloud:/root/.config/gcloud:ro

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      <<: *gcp-env
      DATABASE_URL: sqlite:////data/mpstudio.db
      LOCAL_STORAGE_ROOT: /data/storage
      PUBLIC_BASE_URL: http://localhost:8080
      TASK_POLL_INTERVAL_SECONDS: 8
      STOCK_VIDEO_SOURCE: ${STOCK_VIDEO_SOURCE:-pexels}
      PEXELS_API_KEYS: ${PEXELS_API_KEYS:-}
      PIXABAY_API_KEYS: ${PIXABAY_API_KEYS:-}
      NEWSROOM_LIVE_SIGNALS: ${NEWSROOM_LIVE_SIGNALS:-false}
    ports:
      - "8080:8080"
    volumes:
      - ./local-data:/data
      - *gcp-adc-volume

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    environment:
      <<: *gcp-env
      DATABASE_URL: sqlite:////data/mpstudio.db
      LOCAL_STORAGE_ROOT: /data/storage
      TASK_POLL_INTERVAL_SECONDS: 8
      STOCK_VIDEO_SOURCE: ${STOCK_VIDEO_SOURCE:-pexels}
      PEXELS_API_KEYS: ${PEXELS_API_KEYS:-}
      PIXABAY_API_KEYS: ${PIXABAY_API_KEYS:-}
    volumes:
      - ./local-data:/data
      - *gcp-adc-volume
    depends_on:
      - api

  metadata-agent:
    build:
      context: .
      dockerfile: services/agents/metadata/Dockerfile
    environment:
      <<: *gcp-env
      DATABASE_URL: sqlite:////data/mpstudio.db
      LOCAL_STORAGE_ROOT: /data/storage
      TASK_POLL_INTERVAL_SECONDS: 8
      STOCK_VIDEO_SOURCE: ${STOCK_VIDEO_SOURCE:-pexels}
      PEXELS_API_KEYS: ${PEXELS_API_KEYS:-}
      PIXABAY_API_KEYS: ${PIXABAY_API_KEYS:-}
    volumes:
      - ./local-data:/data
      - *gcp-adc-volume
    depends_on:
      - api

  newsroom-agent:
    build:
      context: .
      dockerfile: services/agents/newsroom/Dockerfile
    environment:
      <<: *gcp-env
      DATABASE_URL: sqlite:////data/mpstudio.db
      LOCAL_STORAGE_ROOT: /data/storage
      TASK_POLL_INTERVAL_SECONDS: 8
      NEWSROOM_LIVE_SIGNALS: ${NEWSROOM_LIVE_SIGNALS:-false}
    volumes:
      - ./local-data:/data
      - *gcp-adc-volume
    depends_on:
      - api

  render-agent:
    build:
      context: .
      dockerfile: services/agents/render/Dockerfile
    environment:
      <<: *gcp-env
      DATABASE_URL: sqlite:////data/mpstudio.db
      LOCAL_STORAGE_ROOT: /data/storage
      SCRATCH_ROOT: /scratch
      TASK_POLL_INTERVAL_SECONDS: 8
      STOCK_VIDEO_SOURCE: ${STOCK_VIDEO_SOURCE:-pexels}
      PEXELS_API_KEYS: ${PEXELS_API_KEYS:-}
      PIXABAY_API_KEYS: ${PIXABAY_API_KEYS:-}
    volumes:
      - ./local-data:/data
      - ./local-data/render-scratch:/scratch
      - *gcp-adc-volume
    depends_on:
      - api

  shortgen-agent:
    build:
      context: .
      dockerfile: services/agents/shortgen/Dockerfile
    environment:
      <<: *gcp-env
      DATABASE_URL: sqlite:////data/mpstudio.db
      LOCAL_STORAGE_ROOT: /data/storage
      SCRATCH_ROOT: /scratch
      TASK_POLL_INTERVAL_SECONDS: 8
      STOCK_VIDEO_SOURCE: ${STOCK_VIDEO_SOURCE:-pexels}
      PEXELS_API_KEYS: ${PEXELS_API_KEYS:-}
      PIXABAY_API_KEYS: ${PIXABAY_API_KEYS:-}
    volumes:
      - ./local-data:/data
      - ./local-data/shortgen-cache:/scratch
      - *gcp-adc-volume
    depends_on:
      - api

  web:
    build:
      context: apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
