[project]
name = "mpstudio"
version = "0.1.0"
description = "Shared contracts and runtime adapters for Prima Studio."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8,<3",
  "pydantic-settings>=2.4,<3",
  "SQLAlchemy>=2.0,<3",
  "google-genai>=1.31,<2",
  "google-cloud-storage>=2.18,<4",
  "google-cloud-texttospeech>=2.16,<3",
  "google-cloud-video-transcoder>=1.13,<2",
  "requests>=2.31,<3",
  "PyYAML>=6.0,<7",
  "imageio-ffmpeg>=0.5,<1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "pytest-asyncio>=0.23,<1",
  "httpx>=0.27,<1",
  "fastapi>=0.115,<1",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
