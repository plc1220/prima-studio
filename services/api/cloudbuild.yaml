substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: mp-ai-video-clipping-api
  _REPO_NAME: mp-ai-video
  _IMAGE_TAG: latest
  _GCS_BUCKET_NAME: mp-ai-video-clipping-bucket-v2

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - services/api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api:${_IMAGE_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api:${_IMAGE_TAG}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --timeout=900
      - --set-env-vars=ENVIRONMENT=cloudrun-light,GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},LIGHT_INLINE_WORKFLOWS=true,TRANSCODER_ENABLED=true,TRANSCODER_POLL_TIMEOUT_SECONDS=600,TRANSCODER_POLL_INTERVAL_SECONDS=15,PUBLIC_BASE_URL=https://${_SERVICE_NAME}-${PROJECT_NUMBER}.${_REGION}.run.app

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api:${_IMAGE_TAG}
